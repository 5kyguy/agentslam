services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentslam
      POSTGRES_PASSWORD: agentslam
      POSTGRES_DB: agentslam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentslam"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
